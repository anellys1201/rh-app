#nombre de la aplicacion. Se usa para logs, microservicios, monitoreo, spring cloud
spring.application.name=rh

# Conexion a mysql
#url para conectarnos a la base de datos. Esta conexion es local y crea la base si no existe.
spring.datasource.url=jdbc:mysql://localhost:3306/recursos_humanos_db?createDatabaseIfNotExist=true

#usuario de bdd
spring.datasource.username=root

#contraseńa de bdd
spring.datasource.password=admin

#driver jdbc. El driver que usa para conectarse. es el oficial de mysql 8+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#para crear bdd y tablas de manera automatica
spring.jpa.hibernate.ddl-auto=update

#mostrar consultas sql desde la consola
spring.jpa.show-sql=true

#cambiar el puerto por default
#server.port=8081